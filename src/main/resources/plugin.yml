name: m7tas
version: '1.0-SNAPSHOT'
main: plugin.M7tas
api-version: '1.21'

commands:
  setup:
    description: Clear all classes and spawn them
    usage: /setup
  spectate:
    description: Spectate a class
    usage: /spectate <class>
  unspectate:
    description: Stop spectating a class
    usage: /unspectate
  tas:
    description: Begin TAS
    usage: /tas <section>
  reset:
    description: Resets all classes to their spawn locations
    usage: /reset
  simulate:
    description: Simulates player actions
    usage: /simulate <move|click|hotbar|turnhead|allblessings|undo>
  getcustomitems:
    description: Get custom items
    usage: /getcustomitems
  verbose:
    description: Toggle verbose debug messages
    usage: /verbose <true|false>
  setspeed:
    description: Set your movement speed (100 = default)
    usage: /setspeed <speed>
  terminal:
    description: Helper command to facilitate terminals phase
    usage: /terminal <section> <terminal>